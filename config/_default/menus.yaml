# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
#     desired widget in your `content/home/` folder.
#   The weight parameter defines the order that the links will appear in.

main:
  - name: Research
    url: '#projects'
    weight: 10
  - name: Experience
    url: '#experience'
    weight: 20
  - name: Awards
    url: '#awards'
    weight: 30
  - name: Funding
    url: '#funding'
    weight: 40
  - name: Publications
    url: '#tags'
    weight: 50
  - name: Portfolio
    url: '#portfolio'
    weight: 60
  - name: Opportunities
    url: '#collaborate'
    weight: 75
  - name: Contact
    url: '#contact'
    weight: 80

